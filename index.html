<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>排班填報系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f5f5;color:#222;font-family:Arial,sans-serif;}
.app{padding:1rem;max-width:600px;margin:0 auto;}
button{cursor:pointer;font-family:inherit;font-size:13px;padding:6px 14px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#222;}
button:hover{background:#f0f0f0;}
.btn-blue{background:#E6F1FB;color:#0C447C;border-color:#85B7EB;}
.btn-blue:hover{background:#B5D4F4;}
.btn-teal{background:#f5f5f5;color:#666;border-color:#ccc;}
.btn-green{background:#EAF3DE;color:#27500A;border-color:#97C459;}
.btn-green:hover{background:#C0DD97;}
.btn-red{color:#791F1F;border-color:#F09595;}
.btn-red:hover{background:#FCEBEB;}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;}
input,select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#222;outline:none;}
input:focus,select:focus{box-shadow:0 0 0 2px #85B7EB;}
.screen{display:none;}.screen.active{display:block;}
.topbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.topbar h2{font-size:17px;font-weight:500;flex:1;min-width:80px;}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
.badge-teal,.badge-amber,.badge-gray{background:#f5f5f5;color:#666;border:1px solid #ddd;}
.badge-green{background:#EAF3DE;color:#27500A;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
.stat{background:#f5f5f5;border-radius:8px;padding:10px;text-align:center;}
.stat-lbl{font-size:11px;color:#666;margin-bottom:3px;}
.stat-val{font-size:20px;font-weight:500;}
.stat-val.ok{color:#0F6E56;}.stat-val.warn{color:#854F0B;}
.tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid #e8e8e8;overflow-x:auto;}
.tab{padding:8px 12px;font-size:13px;border:none;background:transparent;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;white-space:nowrap;}
.tab.active{color:#0C447C;border-bottom-color:#378ADD;font-weight:500;}
.tsec{display:none;}.tsec.active{display:block;}
.progress-bar{height:5px;border-radius:3px;background:#e8e8e8;}
.progress-fill{height:5px;border-radius:3px;}
/* 統一灰色標籤樣式 */
.toggle-btn{display:inline-flex;align-items:center;justify-content:center;font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;border:1px solid #ccc;background:#f5f5f5;color:#888;}
.toggle-btn.on-am, .toggle-btn.on-pm{background:#eee;color:#222;border-color:#bbb;font-weight:700;}
.day-list-row{display:flex;align-items:center;padding:11px 4px;border-bottom:1px solid #f0f0f0;cursor:pointer;-webkit-tap-highlight-color:transparent;border-radius:6px;}
.day-list-row:last-child{border-bottom:none;}
.day-list-row:active{background:#f9f9f9;}
.day-date{width:46px;flex-shrink:0;font-size:12px;color:#666;line-height:1.5;text-align:center;}
.day-date.we{color:#A32D2D;}
.day-slots{flex:1;display:flex;flex-direction:column;gap:4px;}
/* 修正：不再用青橘區分，改為統一灰色 */
.slot-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 8px;border-radius:6px;font-weight:500;background:#f0f0f0;color:#444;}
.slot-tag.empty{background:#f5f5f5;color:#aaa;font-weight:400;}
.day-gap{display:flex;flex-direction:column;gap:3px;margin-left:6px;width:72px;flex-shrink:0;}
.gap-pill{font-size:11px;padding:2px 6px;border-radius:4px;text-align:center;white-space:nowrap;background:#f5f5f5;color:#666;border:1px solid #ddd;}
.day-arrow{color:#ccc;font-size:16px;margin-left:4px;flex-shrink:0;}
.overview-row{display:grid;grid-template-columns:46px 1fr;gap:6px;padding:8px 0;border-bottom:1px solid #f0f0f0;}
.overview-row:last-child{border-bottom:none;}
.ov-slots{display:flex;flex-direction:column;gap:5px;}
.ov-slot-row{display:flex;align-items:flex-start;gap:6px;}
.ov-slot-lbl{font-size:11px;font-weight:500;width:28px;flex-shrink:0;padding-top:2px;color:#888;}
.ov-chips{display:flex;flex-wrap:wrap;gap:3px;flex:1;}
.wk-row{display:grid;grid-template-columns:36px 1fr 1fr;gap:6px;align-items:start;padding:7px 0;border-bottom:1px solid #f0f0f0;}
.wk-row:last-child{border-bottom:none;}
.pref-day-row{display:grid;grid-template-columns:46px 1fr 1fr;gap:6px;align-items:start;padding:7px 0;border-bottom:1px solid #f0f0f0;}
.pref-day-row:last-child{border-bottom:none;}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:1rem;}
.overlay.show{display:flex;}
.modal-box{background:#fff;border:1px solid #ddd;border-radius:12px;width:100%;max-width:360px;padding:1.25rem;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:500;margin-bottom:.75rem;}
.modal-gap-row{display:flex;gap:8px;margin-bottom:.75rem;}
.modal-gap-pill{flex:1;text-align:center;padding:6px 8px;border-radius:8px;font-size:12px;font-weight:500;background:#f5f5f5;color:#666;}
.slot-section{background:#f5f5f5;border-radius:12px;padding:.875rem;margin-bottom:.75rem;}
.slot-section.pref-border{border:1px solid #ccc;}
.big-checkbox{width:22px;height:22px;cursor:pointer;accent-color:#666;flex-shrink:0;}
.time-row{display:flex;gap:8px;align-items:center;margin-top:8px;}
.time-row select{flex:1;font-size:14px;padding:9px 8px;}
.at-status{display:flex;align-items:center;gap:6px;font-size:12px;padding:8px 10px;border-radius:8px;margin-bottom:8px;}
.at-status.ok{background:#EAF3DE;color:#27500A;}
.at-status.err{background:#FCEBEB;color:#791F1F;}
.at-status.loading{background:#f5f5f5;color:#666;}
.field-row{margin-bottom:10px;}
.field-row label{display:block;font-size:12px;color:#666;margin-bottom:4px;}
.field-row input{width:100%;}
.submit-banner{border:1px solid #97C459;border-radius:12px;padding:.875rem 1rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:200px;flex-direction:column;gap:12px;}
.spinner{width:28px;height:28px;border:3px solid #e8e8e8;border-top-color:#378ADD;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="app">

<div id="scr-init" class="screen active">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#666;">連線中，請稍候…</div>
  </div>
</div>

<div id="scr-setup" class="screen">
  <div style="max-width:380px;margin:2rem auto;">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="font-size:20px;font-weight:500;margin-bottom:4px;">排班系統初始設定</div>
      <div style="font-size:13px;color:#666;">請填入 Airtable 連線資訊</div>
    </div>
    <div class="card" style="margin:0;">
      <div class="field-row"><label>Personal Access Token</label><input type="password" id="setup_token" placeholder="patXXXXXXXXXXXXXXX"></div>
      <div class="field-row"><label>Base ID</label><input type="text" id="setup_base" placeholder="appXXXXXXXXXXXXXX"></div>
      <details style="margin-bottom:14px;">
        <summary style="font-size:12px;color:#666;cursor:pointer;margin-bottom:8px;">進階：自訂表格名稱</summary>
        <div style="padding:8px 0;">
          <div class="field-row"><label>每日班表 表格名稱</label><input type="text" id="setup_daily" placeholder="每日班表"></div>
          <div class="field-row"><label>人員工時 表格名稱</label><input type="text" id="setup_hrs" placeholder="人員工時"></div>
          <div class="field-row"><label>人員名單 表格名稱</label><input type="text" id="setup_staff" placeholder="人員名單"></div>
        </div>
      </details>
      <button class="btn-blue" style="width:100%;padding:11px;font-size:15px;" onclick="doSetup()">連線並啟動</button>
      <div id="setupErr" style="margin-top:8px;"></div>
    </div>
  </div>
</div>

<div id="scr-login" class="screen">
  <div style="display:flex;align-items:center;justify-content:center;min-height:300px;">
    <div style="width:100%;max-width:320px;">
      <div style="text-align:center;margin-bottom:1.5rem;">
        <div style="font-size:22px;font-weight:500;margin-bottom:4px;">排班填報系統</div>
        <div style="font-size:14px;color:#666;">請選擇身份登入</div>
      </div>
      <div class="card" style="margin:0;">
        <div style="margin-bottom:12px;">
          <div style="font-size:13px;color:#666;margin-bottom:6px;">身份</div>
          <select id="loginRole" style="width:100%;">
            <option value="">-- 請選擇 --</option>
            <option value="admin">管理者</option>
            <optgroup id="staffOpts" label="── 人員 ──"></optgroup>
          </select>
        </div>
        <button class="btn-blue" style="width:100%;padding:11px;font-size:15px;" onclick="doLogin()">登入</button>
      </div>
    </div>
  </div>
</div>

<div id="scr-overview" class="screen">
  <div class="topbar">
    <h2>本月排班總覽</h2>
    <div style="display:flex;align-items:center;gap:4px;">
      <button onclick="prevM_ov()">&#8249;</button>
      <span id="ovMonLbl" style="font-size:13px;font-weight:500;min-width:72px;text-align:center;"></span>
      <button onclick="nextM_ov()">&#8250;</button>
    </div>
    <button id="ovActionBtn" class="btn-blue" style="display:none;"></button>
    <button onclick="goLogin()">登出</button>
  </div>
  <div class="card" style="padding:.75rem 1rem;margin-bottom:.75rem;">
    <div style="font-size:12px;color:#666;margin-bottom:8px;">人員顏色區分：</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;" id="ovLegend"></div>
  </div>
  <div class="card" style="padding:.75rem 1rem;"><div id="ovBody"></div></div>
</div>

<div id="scr-staff" class="screen">
  <div class="topbar">
    <h2 id="staffTitle"></h2>
    <div style="display:flex;align-items:center;gap:4px;">
      <button onclick="prevM_staff()">&#8249;</button>
      <span id="staffMonLbl" style="font-size:13px;font-weight:500;min-width:72px;text-align:center;"></span>
      <button onclick="nextM_staff()">&#8250;</button>
    </div>
    <button onclick="goToOv()">&#8592; 總覽</button>
    <button onclick="goLogin()">登出</button>
  </div>
  <div class="stat-grid" id="staffStats"></div>
  <div id="submitBanner" class="submit-banner" style="display:none;">
    <div>
      <div style="font-size:13px;font-weight:500;color:#27500A;" id="submitBannerTitle">填寫完成了嗎？</div>
      <button class="btn-green" id="submitBtn" onclick="submitToAirtable()" style="margin-top:5px;">送出並更新</button>
    </div>
  </div>
  <div id="submitStatus"></div>
  <div class="card" style="padding:.75rem 1rem;"><div id="staffDayList"></div></div>
</div>

<div id="scr-admin" class="screen">
  <div class="topbar">
    <h2>管理者</h2>
    <div style="display:flex;align-items:center;gap:4px;">
      <button onclick="prevM()">&#8249;</button>
      <span id="adminMonLbl" style="font-size:13px;font-weight:500;min-width:72px;text-align:center;"></span>
      <button onclick="nextM()">&#8250;</button>
    </div>
    <button class="btn-blue" onclick="doPrint()">列印 A4 班表</button>
    <button onclick="goLogin()">登出</button>
  </div>
  <div class="stat-grid" id="adminStats"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview',this)">每日總覽</button>
    <button class="tab" onclick="switchTab('people',this)">人員管理</button>
    <button class="tab" onclick="switchTab('pref',this)">偏好設定</button>
  </div>
  <div id="tab-overview" class="tsec active"><div class="card" id="adminOv"></div></div>
  <div id="tab-people" class="tsec"><div class="card" id="adminPeople"></div></div>
  <div id="tab-pref" class="tsec"><div class="card" id="tab-pref-content">
      <div style="background:#f5f5f5;padding:15px;border-radius:10px;margin-bottom:15px;">
          <div style="font-weight:700;margin-bottom:10px;">每週固定模板</div>
          <div id="weekTemplate"></div>
          <button class="btn-blue" style="width:100%;margin-top:10px;" onclick="applyWeekTemplate()">將此模板套用到本月</button>
      </div>
      <div id="prefGrid"></div>
  </div></div>
</div>

</div>

<div id="dayOverlay" class="overlay" onclick="overlayBgClick(event)">
  <div class="modal-box">
    <div id="modalTitle" class="modal-title"></div>
    <div id="modalGapRow" class="modal-gap-row"></div>
    <div id="modalBody"></div>
    <button style="width:100%;padding:12px;margin-top:10px;" class="btn-blue" onclick="closeModal()">完成並關閉</button>
  </div>
</div>

<script>
var TARGET=31;
var COLORS=[['#E6F1FB','#0C447C'],['#E1F5EE','#085041'],['#FBEAF0','#72243E'],['#EEEDFE','#3C3489'],['#FAEEDA','#633806'],['#FAECE7','#712B13'],['#EAF3DE','#27500A'],['#FCEBEB','#791F1F']];
var MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
var DW=['日','一','二','三','四','五','六'];
var today=new Date(),vy=today.getFullYear(),vm=today.getMonth();
var ovy=vy,ovm=vm,staffY=vy,staffM=vm;
var currentUser=null,modalPid,modalD,modalY,modalM;
var state={
  staff:[],nextId:1,schedule:{},pref:{},submitted:{},
  weekTpl:[0,1,2,3,4,5,6].map(function(){return{am:false,amN:1,pm:false,pmN:1};})
};
var AT={token:'',base:'',dailyTable:'每日班表',hrsTable:'人員工時',staffTable:'人員名單'};

function pad(n){return n<10?'0'+n:''+n;}
function mkey(y,m){return y+'-'+pad(m+1);}
function t2n(t){var p=t.split(':');return +p[0]+ +p[1]/60;}

// 修正後的工時計算（含12-13點）
function calcH(s,e){
  if(!s||!e)return 0;
  var h=t2n(e)-t2n(s);
  return h>0?h:0;
}

function genTimes(){var t=[];for(var h=7;h<=20;h++){t.push(pad(h)+':00');if(h<20)t.push(pad(h)+':30');}return t;}
var TIMES=genTimes();
function getPdata(pid,y,m){var k=mkey(y,m);if(!state.schedule[k])state.schedule[k]={};if(!state.schedule[k][pid])state.schedule[k][pid]={};return state.schedule[k][pid];}
function getPref(d,y,m){return state.pref[mkey(y,m)+'-'+d]||{am:false,amN:1,pm:false,pmN:1};}
function setPref(d,data,y,m){state.pref[mkey(y,m)+'-'+d]=data;}
function monthHrs(pid,y,m){var dim=new Date(y,m+1,0).getDate(),total=0,pd=getPdata(pid,y,m);for(var d=1;d<=dim;d++){var day=pd[d];if(!day)continue;if(day.am&&day.ams&&day.ame)total+=calcH(day.ams,day.ame);if(day.pm&&day.pms&&day.pme)total+=calcH(day.pms,day.pme);}return total;}
function slotCount(d,slot,y,m){var k=mkey(y,m),n=0;state.staff.forEach(function(p){var day=((state.schedule[k]||{})[p.id]||{})[d];if(!day)return;if(slot==='am'&&day.am&&calcH(day.ams,day.ame)>0)n++;if(slot==='pm'&&day.pm&&calcH(day.pms,day.pme)>0)n++;});return n;}
function gapLabel(d,slot,y,m){var pr=getPref(d,y,m);var on=slot==='am'?pr.am:pr.pm;if(!on)return null;var need=slot==='am'?pr.amN:pr.pmN;var rem=need-slotCount(d,slot,y,m);if(rem<=0)return{text:'已滿',cls:''};return{text:'缺'+rem+'人',cls:''};}
function isSubmitted(pid,y,m){return !!(state.submitted[pid+'-'+mkey(y,m)]);}
function saveLocal(){try{localStorage.setItem('at_config',JSON.stringify(AT));localStorage.setItem('at_state',JSON.stringify({pref:state.pref,submitted:state.submitted,weekTpl:state.weekTpl,schedule:state.schedule}));}catch(e){}}
function loadLocal(){try{var c=localStorage.getItem('at_config');if(c)AT=Object.assign(AT,JSON.parse(c));var s=localStorage.getItem('at_state');if(s){var d=JSON.parse(s);state.pref=d.pref||{};state.submitted=d.submitted||{};state.weekTpl=d.weekTpl||state.weekTpl;state.schedule=d.schedule||{};}}catch(e){}}

async function atFetch(method,table,body,params){
  var url='https://api.airtable.com/v0/'+AT.base+'/'+encodeURIComponent(table);
  if(params)url+='?'+params;
  var opts={method:method,headers:{Authorization:'Bearer '+AT.token,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  var res=await fetch(url,opts);
  var json=await res.json();
  if(!res.ok)throw new Error((json.error&&json.error.message)||'HTTP '+res.status);
  return json;
}
async function atGetAll(table,formula){
  var records=[],offset='';
  do{
    var params='pageSize=100'+(formula?'&filterByFormula='+encodeURIComponent(formula):'')+(offset?'&offset='+offset:'');
    var r=await atFetch('GET',table,null,params);
    records=records.concat(r.records||[]);
    offset=r.offset||'';
  }while(offset);
  return records;
}

async function syncScheduleFromAT(y, m) {
  var monthLabel = y + '年' + (m + 1) + '月';
  var formula = '{月份}="' + monthLabel + '"';
  try {
    var records = await atGetAll(AT.dailyTable, formula);
    var k = mkey(y, m);
    state.schedule[k] = {};
    records.forEach(function(rec) {
      var f = rec.fields;
      var staff = state.staff.find(function(s){ return s.name === f['姓名']; });
      if (!staff) return;
      var pid = staff.id;
      if (!state.schedule[k][pid]) state.schedule[k][pid] = {};
      var d = parseInt(f['日期'].split('-')[2]);
      state.schedule[k][pid][d] = {
        am: !!f['上午開始'], ams: f['上午開始'] || '09:00', ame: f['上午結束'] || '12:00',
        pm: !!f['下午開始'], pms: f['下午開始'] || '13:00', pme: f['下午結束'] || '16:00'
      };
      state.submitted[pid + '-' + k] = true;
    });
    saveLocal();
  } catch (e) { console.error("同步失敗", e); }
}

async function loadStaffFromAirtable(){
  var records=await atGetAll(AT.staffTable);
  state.staff=records.map(function(r,i){return{id:r.id,atId:r.id,name:r.fields['姓名']||'',idx:i};});
  refreshStaffOpts();
}

async function submitToAirtable() {
  var pid = currentUser.pid, y = staffY, m = staffM;
  var p = state.staff.find(function(x) { return x.id === pid; });
  if (!p) return;
  var btn = document.getElementById('submitBtn'); btn.disabled = true; btn.textContent = '處理中…';
  var monthLabel = y + '年' + (m + 1) + '月';
  try {
    var formula = 'AND({姓名}="' + p.name + '",{月份}="' + monthLabel + '")';
    var existing = await atGetAll(AT.dailyTable, formula);
    for (var rec of existing) {
      await fetch('https://api.airtable.com/v0/' + AT.base + '/' + encodeURIComponent(AT.dailyTable) + '/' + rec.id, {
        method: 'DELETE', headers: { Authorization: 'Bearer ' + AT.token }
      });
    }
    var pd = getPdata(pid, y, m), count = 0, dim = new Date(y, m + 1, 0).getDate();
    for (var d = 1; d <= dim; d++) {
      var day = pd[d], dh = 0;
      if (day && day.am) dh += calcH(day.ams, day.ame);
      if (day && day.pm) dh += calcH(day.pms, day.pme);
      if (dh <= 0) continue;
      var fields = {
        '姓名': p.name, '月份': monthLabel, '日期': y + '-' + pad(m + 1) + '-' + pad(d),
        '上午開始': day.am ? day.ams : '', '上午結束': day.am ? day.ame : '',
        '下午開始': day.pm ? day.pms : '', '下午結束': day.pm ? day.pme : '',
        '當日工時': parseFloat(dh.toFixed(2)), '唯一鍵': p.name + '_' + monthLabel + '_' + pad(d)
      };
      await atFetch('POST', AT.dailyTable, { records: [{ fields: fields }] });
      count++;
    }
    var totalHrs = monthHrs(pid, y, m);
    var hrsFields = { '姓名': p.name, '月份': monthLabel, '總工時': parseFloat(totalHrs.toFixed(1)), '是否達標': totalHrs >= TARGET, '唯一鍵': p.name + '_' + monthLabel };
    var existingHrs = await atGetAll(AT.hrsTable, 'FIND("' + (p.name + '_' + monthLabel) + '",{唯一鍵})=1');
    if(existingHrs.length > 0) await atFetch('PATCH', AT.hrsTable, { records: [{ id: existingHrs[0].id, fields: hrsFields }] });
    else await atFetch('POST', AT.hrsTable, { records: [{ fields: hrsFields }] });

    state.submitted[pid + '-' + mkey(y, m)] = true;
    saveLocal();
    alert('同步完成！共上傳 ' + count + ' 筆紀錄');
    btn.disabled = false; btn.textContent = '重新送出';
    renderStaff();
  } catch (err) { alert('失敗：' + err.message); btn.disabled = false; }
}

// 修正標籤顏色為灰色的渲染函數
function renderOv(){
  var y=ovy,m=ovm; document.getElementById('ovMonLbl').textContent=y+'年 '+MONTHS[m];
  var btn=document.getElementById('ovActionBtn');
  if(currentUser&&currentUser.role==='staff'){btn.style.display='';btn.textContent='前往填寫 →';btn.onclick=function(){staffY=y;staffM=m;showScreen('scr-staff');renderStaff();};}
  var leg=''; state.staff.forEach(function(p,i){leg+='<span style="font-size:12px;background:'+COLORS[i%8][0]+';color:'+COLORS[i%8][1]+';padding:2px 8px;border-radius:10px;margin:2px;display:inline-block;">'+p.name+'</span>';});
  document.getElementById('ovLegend').innerHTML=leg;
  var dim=new Date(y,m+1,0).getDate(),k=mkey(y,m),html='';
  for(var d=1;d<=dim;d++){
    var dow=new Date(y,m,d).getDay(),isWE=dow===0||dow===6,pr=getPref(d,y,m);
    var amArr=[],pmArr=[];
    state.staff.forEach(function(p,i){
      var day=((state.schedule[k]||{})[p.id]||{})[d];
      if(!day)return;
      if(day.am&&calcH(day.ams,day.ame)>0)amArr.push({p:p,i:i,s:day.ams,e:day.ame});
      if(day.pm&&calcH(day.pms,day.pme)>0)pmArr.push({p:p,i:i,s:day.pms,e:day.pme});
    });
    var amGap=gapLabel(d,'am',y,m),pmGap=gapLabel(d,'pm',y,m);
    var prefTag = '<span style="font-size:9px;background:#eee;color:#888;padding:1px 4px;border-radius:3px;margin-right:4px;border:1px solid #ddd;">偏好</span>';
    html+='<div class="overview-row"><div class="day-date'+(isWE?' we':'')+'">'+(m+1)+'/'+d+'<br>'+DW[dow]+'</div><div class="ov-slots">';
    html+='<div class="ov-slot-row"><span class="ov-slot-lbl">上</span><div class="ov-chips">'+(pr.am?prefTag:'')+(amArr.length?amArr.map(function(x){return '<span style="background:'+COLORS[x.i%8][0]+';color:'+COLORS[x.i%8][1]+';border-radius:6px;padding:2px 6px;font-size:11px;">'+x.p.name+' '+x.s+'</span>';}).join(''):'—')+(amGap?'<span class="gap-pill">'+amGap.text+'</span>':'')+'</div></div>';
    html+='<div class="ov-slot-row"><span class="ov-slot-lbl">下</span><div class="ov-chips">'+(pr.pm?prefTag:'')+(pmArr.length?pmArr.map(function(x){return '<span style="background:'+COLORS[x.i%8][0]+';color:'+COLORS[x.i%8][1]+';border-radius:6px;padding:2px 6px;font-size:11px;">'+x.p.name+' '+x.s+'</span>';}).join(''):'—')+(pmGap?'<span class="gap-pill">'+pmGap.text+'</span>':'')+'</div></div></div></div>';
  }
  document.getElementById('ovBody').innerHTML=html;
}

function renderStaff(){
  var y=staffY,m=staffM,p=state.staff.find(function(x){return x.id===currentUser.pid;});
  document.getElementById('staffTitle').textContent=p.name;
  document.getElementById('staffMonLbl').textContent=y+'年 '+MONTHS[m];
  updateStaffStats();
  document.getElementById('submitBanner').style.display='flex';
  var dim=new Date(y,m+1,0).getDate(),pd=getPdata(p.id,y,m),html='';
  for(var d=1;d<=dim;d++){
    var dow=new Date(y,m,d).getDay(),isWE=dow===0||dow===6,pr=getPref(d,y,m),day=pd[d]||{};
    var amGap=gapLabel(d,'am',y,m),pmGap=gapLabel(d,'pm',y,m);
    html+='<div class="day-list-row" onclick="openDayModal(\''+p.id+'\','+d+','+y+','+m+')"><div class="day-date'+(isWE?' we':'')+'">'+(m+1)+'/'+d+'<br>'+DW[dow]+'</div><div class="day-slots">';
    if(day.am)html+='<div style="display:flex;align-items:center;gap:5px;"><span class="slot-tag">上午 '+day.ams+'–'+day.ame+'</span>'+(pr.am?'<span style="font-size:9px;color:#999;">(偏好)</span>':'')+'</div>';
    if(day.pm)html+='<div style="display:flex;align-items:center;gap:5px;"><span class="slot-tag">下午 '+day.pms+'–'+day.pme+'</span>'+(pr.pm?'<span style="font-size:9px;color:#999;">(偏好)</span>':'')+'</div>';
    if(!day.am&&!day.pm)html+='<span class="slot-tag empty">未排班</span>';
    html+='</div><div class="day-gap">';
    if(amGap)html+='<span class="gap-pill">上 '+amGap.text+'</span>';
    if(pmGap)html+='<span class="gap-pill">下 '+pmGap.text+'</span>';
    html+='</div><div class="day-arrow">›</div></div>';
  }
  document.getElementById('staffDayList').innerHTML=html;
}

function doPrint(){
  var dim=new Date(vy,vm+1,0).getDate(),k=mkey(vy,vm),rows='';
  for(var d=1;d<=dim;d++){
    var dow=new Date(vy,vm,d).getDay(),isWE=dow===0||dow===6,amL=[],pmL=[];
    state.staff.forEach(function(p,i){
      var day=((state.schedule[k]||{})[p.id]||{})[d];
      if(!day)return;
      if(day.am)amL.push('<span style="background:'+COLORS[i%8][0]+';padding:1px 4px;border-radius:3px;">'+p.name+'('+day.ams+')</span>');
      if(day.pm)pmL.push('<span style="background:'+COLORS[i%8][0]+';padding:1px 4px;border-radius:3px;">'+p.name+'('+day.pms+')</span>');
    });
    rows+='<tr style="font-size:11px;">'+
          '<td style="text-align:center;border:1px solid #ddd;'+(isWE?'background:#f9f9f9;':'')+'">'+(vm+1)+'/'+d+'('+DW[dow]+')</td>'+
          '<td style="border:1px solid #ddd;padding:2px;">'+(amL.join(' ')||'—')+'</td>'+
          '<td style="border:1px solid #ddd;padding:2px;">'+(pmL.join(' ')||'—')+'</td></tr>';
  }
  var w=window.open('','_blank');
  w.document.write('<html><head><title>班表</title><style>table{width:100%;border-collapse:collapse;}td,th{border:1px solid #000;padding:4px;font-size:12px;}</style></head><body>'+
    '<h3 style="text-align:center;">'+vy+'年'+(vm+1)+'月 班表總覽</h3>'+
    '<table><thead><tr><th style="width:15%;">日期</th><th style="width:42%;">上午班</th><th style="width:42%;">下午班</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '</body></html>');
  w.document.close(); w.print();
}

// 其餘輔助函數 (Login, Setup, Tabs, Modal)
function doLogin(){
  var role=document.getElementById('loginRole').value; if(!role)return;
  if(role==='admin'){currentUser={role:'admin'}; renderAdmin();}
  else{ var p=state.staff.find(x=>x.id===role); currentUser={role:'staff',pid:p.id,name:p.name}; syncScheduleFromAT(staffY, staffM).then(()=>renderStaff()); showScreen('scr-staff'); }
}
function goLogin(){ location.reload(); }
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function refreshStaffOpts(){ var og=document.getElementById('staffOpts'); og.innerHTML=''; state.staff.forEach(p=>{ var o=document.createElement('option'); o.value=p.id; o.textContent=p.name; og.appendChild(o); }); }
function switchTab(id,el){ document.querySelectorAll('.tsec').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById('tab-'+id).classList.add('active'); el.classList.add('active'); if(id==='overview')renderAdminOv(); }
function renderAdminOv(){ renderOv(); document.getElementById('adminOv').innerHTML = document.getElementById('ovBody').innerHTML; }
function updateStaffStats(){ var hrs=monthHrs(currentUser.pid,staffY,staffM); document.getElementById('staffStats').innerHTML='<div class="stat"><div class="stat-lbl">已排時數</div><div class="stat-val">'+hrs.toFixed(1)+'h</div></div><div class="stat"><div class="stat-lbl">目標</div><div class="stat-val">'+TARGET+'h</div></div>'; }
function closeModal(){document.getElementById('dayOverlay').classList.remove('show'); renderStaff();}
function mToggle(slot){ensureDay(); state.schedule[mkey(modalY,modalM)][modalPid][modalD][slot]=document.getElementById('m_'+slot).checked; }
function mTime(slot,se,val){ensureDay(); state.schedule[mkey(modalY,modalM)][modalPid][modalD][slot==='am'?(se==='s'?'ams':'ame'):(se==='s'?'pms':'pme')]=val; }
function ensureDay(){ var k=mkey(modalY,modalM); if(!state.schedule[k])state.schedule[k]={}; if(!state.schedule[k][modalPid])state.schedule[k][modalPid]={}; if(!state.schedule[k][modalPid][modalD])state.schedule[k][modalPid][modalD]={am:false,ams:'09:00',ame:'12:00',pm:false,pms:'13:00',pme:'16:00'}; }
function openDayModal(pid,d,y,m){ modalPid=pid; modalD=d; modalY=y; modalM=m; var day=getPdata(pid,y,m)[d]||{am:false,ams:'09:00',ame:'12:00',pm:false,pms:'13:00',pme:'16:00'}; document.getElementById('modalTitle').textContent=y+'/'+(m+1)+'/'+d; var html='<div class="slot-section"><label><input type="checkbox" id="m_am" '+(day.am?'checked':'')+' onchange="mToggle(\'am\')"> 上午班</label><div class="time-row">'+mkSel('m_ams',day.ams,'mTime(\'am\',\'s\',this.value)')+'~'+mkSel('m_ame',day.ame,'mTime(\'am\',\'e\',this.value)')+'</div></div><div class="slot-section"><label><input type="checkbox" id="m_pm" '+(day.pm?'checked':'')+' onchange="mToggle(\'pm\')"> 下午班</label><div class="time-row">'+mkSel('m_pms',day.pms,'mTime(\'pm\',\'s\',this.value)')+'~'+mkSel('m_pme',day.pme,'mTime(\'pm\',\'e\',this.value)')+'</div></div>'; document.getElementById('modalBody').innerHTML=html; document.getElementById('dayOverlay').classList.add('show'); }
function overlayBgClick(e){if(e.target.id==='dayOverlay')closeModal();}

function init(){ loadLocal(); if(AT.token) loadStaffFromAirtable().then(()=>showScreen('scr-login')); else showScreen('scr-setup'); }
async function doSetup(){ AT.token=document.getElementById('setup_token').value; AT.base=document.getElementById('setup_base').value; saveLocal(); init(); }

init();
</script>
