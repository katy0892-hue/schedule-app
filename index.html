<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>醫院科室排班填報系統</title>
<style>
/* --- 基礎樣式 --- */
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f5f5;color:#222;font-family:Arial,sans-serif;line-height:1.4;}
.app{padding:1rem;max-width:600px;margin:0 auto;}
button{cursor:pointer;font-family:inherit;font-size:13px;padding:6px 14px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#222;}
button:hover{background:#f0f0f0;}
.btn-blue{background:#E6F1FB;color:#0C447C;border-color:#85B7EB;}
.btn-blue:hover{background:#B5D4F4;}
.btn-green{background:#EAF3DE;color:#27500A;border-color:#97C459;}
.btn-red{color:#791F1F;border-color:#F09595;}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;}
input,select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;outline:none;}

/* --- 螢幕切換 --- */
.screen{display:none;}.screen.active{display:block;}
.topbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.topbar h2{font-size:17px;font-weight:500;flex:1;min-width:80px;}

/* --- 標籤樣式：統一為中性灰色 --- */
.badge-gray, .slot-tag, .gap-pill {
    background:#f2f2f2;
    color:#666;
    border:1px solid #ddd;
    font-size:11px;
    padding:2px 6px;
    border-radius:4px;
    font-weight:500;
}
.slot-tag.empty { background:transparent; border-color:#eee; color:#ccc; }

/* --- 統計面板 --- */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
.stat{background:#f5f5f5;border-radius:8px;padding:10px;text-align:center;}
.stat-lbl{font-size:11px;color:#666;margin-bottom:3px;}
.stat-val{font-size:18px;font-weight:700;}
.stat-val.ok{color:#0F6E56;}.stat-val.warn{color:#854F0B;}

/* --- 列表與排版 --- */
.tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid #e8e8e8;}
.tab{padding:8px 12px;font-size:13px;border:none;background:transparent;color:#888;cursor:pointer;}
.tab.active{color:#0C447C;border-bottom:2px solid #378ADD;font-weight:700;}
.tsec{display:none;}.tsec.active{display:block;}

.day-list-row, .overview-row{
    display:grid;
    grid-template-columns:46px 1fr;
    gap:8px;
    padding:10px 0;
    border-bottom:1px solid #f0f0f0;
}
.day-date{font-size:12px;color:#666;text-align:center;line-height:1.4;}
.day-date.we{color:#A32D2D;font-weight:700;}
.ov-slot-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;}
.ov-slot-lbl{font-size:11px;color:#999;width:15px;flex-shrink:0;padding-top:2px;}
.ov-chips{display:flex;flex-wrap:wrap;gap:4px;flex:1;}

/* --- 彈窗 --- */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:1rem;}
.overlay.show{display:flex;}
.modal-box{background:#fff;border-radius:12px;width:100%;max-width:360px;padding:1.5rem;max-height:90vh;overflow-y:auto;}
.slot-section{background:#f9f9f9;border-radius:8px;padding:12px;margin-bottom:10px;border:1px solid #eee;}

.spinner{width:24px;height:24px;border:3px solid #eee;border-top-color:#378ADD;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="app">

<div id="scr-init" class="screen active">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:12px;">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#666;">同步資料庫中...</div>
  </div>
</div>

<div id="scr-setup" class="screen">
  <div style="max-width:380px;margin:2rem auto;">
    <h2 style="text-align:center;margin-bottom:1.5rem;">Airtable 連線設定</h2>
    <div class="card">
      <div style="margin-bottom:10px;"><label style="font-size:12px;color:#666;">Personal Access Token</label><input type="password" id="setup_token" style="width:100%;" placeholder="pat..."></div>
      <div style="margin-bottom:10px;"><label style="font-size:12px;color:#666;">Base ID</label><input type="text" id="setup_base" style="width:100%;" placeholder="app..."></div>
      <button class="btn-blue" style="width:100%;padding:12px;" onclick="doSetup()">儲存並啟動</button>
      <div id="setupErr" style="margin-top:10px;font-size:12px;color:red;"></div>
    </div>
  </div>
</div>

<div id="scr-login" class="screen">
  <div style="max-width:320px;margin:4rem auto;text-align:center;">
    <h1 style="font-size:22px;margin-bottom:1.5rem;">排班填報系統</h1>
    <div class="card">
      <select id="loginRole" style="width:100%;margin-bottom:15px;padding:12px;">
        <option value="">-- 請選擇身份 --</option>
        <option value="admin">管理者 (Admin)</option>
        <optgroup id="staffOpts" label="── 填報人員 ──"></optgroup>
      </select>
      <button class="btn-blue" style="width:100%;padding:12px;font-size:15px;" onclick="doLogin()">進入系統</button>
    </div>
  </div>
</div>
